<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LALA TOPUP - Auto Dynamic System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* মূল ডিজাইন এবং স্টাইল */
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        .header { background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .brand { color: #6c5ce7; font-weight: bold; font-size: 1.1rem; }
        .balance-badge { background: #6c5ce7; color: white; padding: 4px 12px; border-radius: 15px; font-size: 0.85rem; }
        
        /* অ্যাডমিন স্ট্যাটাস ব্যাজ */
        .admin-status { display: flex; align-items: center; gap: 5px; font-size: 0.7rem; padding: 3px 8px; border-radius: 12px; font-weight: bold; }
        .status-online { background: #e7f9ed; color: #2ecc71; border-color: #2ecc71; }
        .status-offline { background: #fceaea; color: #e74c3c; border-color: #e74c3c; }
        .dot { width: 7px; height: 7px; border-radius: 50%; }
        .dot-on { background: #2ecc71; box-shadow: 0 0 5px #2ecc71; animation: pulse 1.5s infinite; }
        .dot-off { background: #e74c3c; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* নোটিশ বার */
        .dynamic-notice-container { width: 100%; background: #2d3436; height: 40px; display: flex; align-items: center; position: relative; overflow: hidden; border-bottom: 2px solid #6c5ce7; }
        .notice-label-fixed { position: absolute; left: 0; background: #6c5ce7; color: #fff; padding: 0 12px; height: 100%; display: flex; align-items: center; font-weight: bold; font-size: 13px; z-index: 10; }
        .dynamic-scrolling-text { white-space: nowrap; padding-left: 100%; display: inline-block; animation: lala-scroll 20s linear infinite; font-size: 14px; color: #fff; }
        @keyframes lala-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-180%); } }

        /* কার্ড গ্রিড */
        .section-header { padding: 15px; font-size: 1rem; font-weight: bold; color: #1e3799; text-align: center; }
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 12px; }
        .product-card { background: #fff; border-radius: 15px; overflow: hidden; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); padding-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .product-card:active { transform: scale(0.95); }
        .icon-box { width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #6c5ce7; }
        .product-name { font-size: 0.65rem; font-weight: bold; color: #333; }

        /* মোডাল স্টাইল */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 60px auto; width: 85%; max-width: 380px; border-radius: 20px; padding: 25px; position: relative; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-btn { position: absolute; right: 15px; top: 15px; border: none; background: #f0f0f0; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }
        .submit-btn { width: 100%; background: #6c5ce7; color: white; padding: 14px; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .submit-btn:disabled { background: #ccc; }
        .pass-box { display: none; margin-top: 15px; padding: 20px; background: #e7f9ed; border: 2px solid #2ecc71; border-radius: 15px; text-align: center; }
        .social-btn { color: white; text-decoration: none; display: block; padding: 12px; border-radius: 10px; margin-bottom: 10px; text-align: center; font-weight: bold; }
        .yt-btn { background: #ff0000; }
        .tk-btn { background: #000000; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="brand">LALA TOPUP</div>
            <div id="adminBadge" class="admin-status status-online">
                <div id="adminDot" class="dot dot-on"></div>
                <span id="adminStatusText">Checking...</span>
            </div>
        </div>
        <div class="balance-badge">৳ 0.00</div>
    </div>

    <div class="dynamic-notice-container">
        <div class="notice-label-fixed"><i class="fas fa-bullhorn"></i> NEWS</div>
        <div id="lalaNotice" class="dynamic-scrolling-text">অ্যাডমিন স্ট্যাটাস লোড হচ্ছে...</div>
    </div>

    <div class="section-header">SECURE UNLOCK SYSTEM</div>
    <div class="card-grid">
        <div class="product-card" onclick="openSSModal('Apps Password')">
            <div class="icon-box" style="background: #f39c12; color: white;"><i class="fas fa-key"></i></div>
            <span class="product-name">GET PASSWORD</span>
        </div>
        <div class="product-card" onclick="openTelegramSystem()">
            <div class="icon-box" style="background: #0088cc; color: white;"><i class="fab fa-telegram-plane"></i></div>
            <span class="product-name">TELEGRAM VIP</span>
        </div>
    </div>

    <!-- Universal Unlock Modal -->
    <div id="ssModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeSSModal()">&times;</button>
            <h3 id="ssModalTitle" style="text-align: center; margin-bottom: 5px;">Unlock Request</h3>
            <p id="ssDescription" style="font-size: 0.75rem; text-align: center; color: #666; margin-bottom: 20px;">স্ক্রিনশট দিন, অ্যাডমিন এপ্রুভ করলে অটো পাসওয়ার্ড পাবেন।</p>
            
            <a href="https://youtube.com/@lalagamer100" target="_blank" class="social-btn yt-btn"><i class="fab fa-youtube"></i> Subscribe Youtube</a>
            <a href="https://www.tiktok.com/@rdx_lala1" target="_blank" class="social-btn tk-btn"><i class="fab fa-tiktok"></i> Follow TikTok</a>

            <div id="uploadFormArea">
                <label style="display: block; padding: 25px; border: 2px dashed #6c5ce7; border-radius: 15px; cursor: pointer; text-align: center; background: #f9f8ff;">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: #6c5ce7;"></i>
                    <p id="ssFileName" style="font-size: 0.8rem; margin-top: 10px;">ক্লিকের স্ক্রিনশট সিলেক্ট করুন</p>
                    <input type="file" id="ssInput" accept="image/*" multiple style="display: none;" onchange="updateFileInfo(this)">
                </label>
                <button id="unlockBtn" class="submit-btn" disabled onclick="handleUnlock()">SUBMIT FOR APPROVAL</button>
            </div>

            <!-- পাসওয়ার্ড ইনপুট সেকশন (শুধুমাত্র টেলিগ্রামের জন্য) -->
            <div id="passwordEntryArea" style="display: none; margin-top: 15px;">
                <input type="text" id="userPassInput" placeholder="অটো পাসওয়ার্ডটি এখানে দিন" style="width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 10px; text-align: center; font-size: 1.1rem; outline: none;">
                <button class="submit-btn" onclick="verifyDynamicPass()">JOIN TELEGRAM NOW</button>
            </div>

            <div id="passwordResult" class="pass-box">
                <p id="verificationStatus" style="font-weight:bold; color: #27ae60;">অ্যাডমিন চেক করছে...</p>
                <h2 id="finalPassword" style="color:#6c5ce7; font-size: 2rem; letter-spacing: 3px; margin: 10px 0;"></h2>
                <div id="telegramLinkArea" style="display: none; margin-top: 10px;">
                    <a href="https://t.me/LalaTopUp" target="_blank" class="social-btn" style="background: #2980b9;">CLICK TO JOIN CHANNEL</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // আপনার কনফিগারেশন
        const botToken = "8791604536:AAGHR3iQmldzR7Ld7Q7thyJRODJa2E7lr54";
        const chatId = "-1003881711233";
        const fbBaseURL = "https://lala-status-default-rtdb.asia-southeast1.firebasedatabase.app";
        
        let isTelegramTask = false;

        // --- ১. অটোমেটিক পাসওয়ার্ড জেনারেশন (প্রতি ১ ঘণ্টা অন্তর পরিবর্তন) ---
        function generateAutoPass() {
            const secret = "LALA_RDX_ADMIN"; // সিক্রেট কী
            const d = new Date();
            // বর্তমান তারিখ ও ঘণ্টার ওপর ভিত্তি করে ইউনিক কী
            const timeKey = `${d.getFullYear()}${d.getMonth()+1}${d.getDate()}${d.getHours()}`;
            
            let hash = 0;
            const combined = secret + timeKey;
            for (let i = 0; i < combined.length; i++) {
                hash = ((hash << 5) - hash) + combined.charCodeAt(i);
                hash |= 0; 
            }
            return "LALA" + Math.abs(hash).toString().substring(0, 4);
        }

        // অ্যাডমিন স্ট্যাটাস সিঙ্ক
        function syncAdmin() {
            fetch(`${fbBaseURL}/.json`).then(res => res.json()).then(data => {
                const badge = document.getElementById('adminBadge');
                const notice = document.getElementById('lalaNotice');
                if (data && data.status === 'online') {
                    badge.className = "admin-status status-online";
                    notice.innerHTML = "✅ অ্যাডমিন এখন অনলাইনে আছে! দ্রুত এপ্রুভাল পাওয়া যাবে।";
                } else {
                    badge.className = "admin-status status-offline";
                    notice.innerHTML = "⚠️ অ্যাডমিন বর্তমানে অফলাইনে। এপ্রুভ করতে সময় লাগতে পারে।";
                }
            });
        }
        setInterval(syncAdmin, 8000); syncAdmin();

        function openSSModal(title) {
            isTelegramTask = false;
            showModal(title);
        }

        function openTelegramSystem() {
            isTelegramTask = true;
            showModal("Join Telegram VIP");
        }

        function showModal(title) {
            document.getElementById('ssModalTitle').innerText = title;
            document.getElementById('ssModal').style.display = 'block';
            document.getElementById('uploadFormArea').style.display = 'block';
            document.getElementById('passwordEntryArea').style.display = 'none';
            document.getElementById('passwordResult').style.display = 'none';
            document.getElementById('ssInput').value = "";
        }

        function closeSSModal() { document.getElementById('ssModal').style.display = 'none'; }

        function updateFileInfo(input) {
            document.getElementById('ssFileName').innerText = input.files.length + " টি স্ক্রিনশট সিলেক্টেড";
            document.getElementById('unlockBtn').disabled = input.files.length === 0;
        }

        async function handleUnlock() {
            const fileInput = document.getElementById('ssInput');
            const btn = document.getElementById('unlockBtn');
            btn.disabled = true; btn.innerText = "SENDING...";
            const reqId = "REQ" + Date.now();

            // টেলিগ্রাম বটে স্ক্রিনশট পাঠানো
            for (let i = 0; i < fileInput.files.length; i++) {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', fileInput.files[i]);
                formData.append('caption', `🔔 নতুন রিকোয়েস্ট\nটাইপ: ${document.getElementById('ssModalTitle').innerText}\nID: ${reqId}`);
                if (i === fileInput.files.length - 1) {
                    formData.append('reply_markup', JSON.stringify({
                        inline_keyboard: [[
                            { text: "✅ Approve", callback_data: `approve_${reqId}` },
                            { text: "❌ Reject", callback_data: `reject_${reqId}` }
                        ]]
                    }));
                }
                await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: formData });
            }

            // Firebase-এ রিকোয়েস্ট সেভ
            await fetch(`${fbBaseURL}/requests/${reqId}.json`, { method: 'PUT', body: JSON.stringify({ status: "pending" }) });

            document.getElementById('uploadFormArea').style.display = 'none';
            document.getElementById('passwordResult').style.display = 'block';
            checkRequestStatus(reqId);
        }

        function checkRequestStatus(reqId) {
            const timer = setInterval(async () => {
                const res = await fetch(`${fbBaseURL}/requests/${reqId}.json`);
                const data = await res.json();
                
                if (data && data.status === "approved") {
                    clearInterval(timer);
                    const currentPass = generateAutoPass(); // বর্তমান ঘণ্টার পাসওয়ার্ড
                    
                    if (isTelegramTask) {
                        document.getElementById('verificationStatus').innerText = "অ্যাডমিন অনুমতি দিয়েছে!";
                        document.getElementById('passwordEntryArea').style.display = "block";
                        document.getElementById('finalPassword').innerText = "পাসওয়ার্ডটি নিচে ইনপুট দিন";
                    } else {
                        document.getElementById('verificationStatus').innerText = "আপনার আনলক পাসওয়ার্ড:";
                        document.getElementById('finalPassword').innerText = currentPass;
                    }
                } else if (data && data.status === "rejected") {
                    clearInterval(timer);
                    alert("আপনার রিকোয়েস্ট রিজেক্ট করা হয়েছে। সঠিক স্ক্রিনশট দিন।");
                    closeSSModal();
                }
            }, 3000);
        }

        function verifyDynamicPass() {
            const input = document.getElementById('userPassInput').value.trim().toUpperCase();
            const correctPass = generateAutoPass();
            
            if (input === correctPass) {
                document.getElementById('passwordEntryArea').style.display = "none";
                document.getElementById('telegramLinkArea').style.display = "block";
                document.getElementById('finalPassword').innerText = "SUCCESS!";
            } else {
                alert("ভুল বা মেয়াদোত্তীর্ণ পাসওয়ার্ড! আবার ট্রাই করুন।");
            }
        }

        window.onclick = e => { if (e.target.className === 'modal') closeSSModal(); }
    </script>
</body>
</html>
