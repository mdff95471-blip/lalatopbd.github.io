<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LALA TOPUP - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px; }
        .header { background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .brand { color: #6c5ce7; font-weight: bold; font-size: 1.1rem; }
        .balance-badge { background: #6c5ce7; color: white; padding: 4px 12px; border-radius: 15px; font-size: 0.85rem; }
        
        .banner { width: 95%; margin: 15px auto; border-radius: 12px; overflow: hidden; display: block; }
        .banner img { width: 100%; aspect-ratio: 1000 / 398; object-fit: cover; display: block; border-radius: 12px; }

        .section-header { padding: 0 15px; margin: 20px 0 10px; font-size: 0.9rem; font-weight: bold; color: #444; border-left: 4px solid #6c5ce7; margin-left: 15px; }
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; }
        .product-card { background: #fff; border-radius: 12px; border: 1px solid #eee; overflow: hidden; text-align: center; padding-bottom: 8px; cursor: pointer; }
        .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .product-name { font-size: 0.75rem; color: #333; margin-top: 5px; padding: 0 5px; font-weight: 500; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); overflow-y: auto; }
        .modal-content { background: white; margin: 10% auto; width: 90%; max-width: 450px; border-radius: 15px; overflow: hidden; position: relative; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-header { background: #fff; padding: 15px; text-align: center; font-weight: bold; color: #6c5ce7; border-bottom: 1px solid #eee; }
        .close-btn { position: absolute; right: 15px; top: 15px; cursor: pointer; color: #888; font-size: 1.5rem; border: none; background: none; }
        
        .package-list { padding: 15px; }
        .package-item { border: 1px solid #eee; margin-bottom: 10px; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .package-item:hover { background: #f0edff; border-color: #6c5ce7; }
        .pkg-name { font-size: 0.85rem; color: #444; font-weight: 500; }
        .pkg-price { color: #6c5ce7; font-weight: bold; }

        /* Form Styles */
        .order-form-container { padding: 20px; }
        .payment-info { background: #fff4f4; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; border: 1px dashed #d63031; text-align: center; }
        .payment-info b { color: #d63031; font-size: 1.1rem; }

        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 0.9rem; }
        input:focus { border-color: #6c5ce7; outline: none; box-shadow: 0 0 5px rgba(108, 92, 231, 0.2); }
        .submit-btn { width: 100%; background: #6c5ce7; color: white; padding: 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; }
        .nav-item { text-align: center; color: #888; font-size: 0.65rem; text-decoration: none; }
        .nav-item i { display: block; font-size: 1.2rem; margin-bottom: 3px; }
        .nav-item.active { color: #6c5ce7; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">LALA TOPUP</div>
        <div class="balance-badge">৳ 0.00</div>
    </div>

    <div class="banner">
        <img src="banner.jpg" alt="Banner">
    </div>

    <div class="section-header">FREE FIRE TOPUP</div>

    <div class="card-grid">
        <div class="product-card" onclick="openPkgModal('FF Guild glory', 'guild')">
            <img src="glory.jpg" alt="Guild">
            <div class="product-name">FF Guild glory</div>
        </div>
        <div class="product-card" onclick="openPkgModal('Weekly/Monthly Offer', 'offers')">
            <img src="offer.jpg" alt="Offer">
            <div class="product-name">Weekly/Monthly Offer</div>
        </div>
        <div class="product-card" onclick="openPkgModal('Free Fire - 200 Like', 'likes')">
            <img src="like.jpg" alt="Like">
            <div class="product-name">Free Fire - 200 Like প্রতিদিন</div>
        </div>
    </div>

    <div id="pkgModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalTitle">Package Selection</span>
                <button class="close-btn" onclick="closeAllModals()">&times;</button>
            </div>
            <div class="package-list" id="listContent"></div>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>অর্ডার সম্পন্ন করুন</span>
                <button class="close-btn" onclick="closeAllModals()">&times;</button>
            </div>
            <div class="order-form-container">
                <div class="payment-info">
                    বিকাশ পার্সোনাল: <b>01794327542</b><br>
                    <small>টাকা পাঠিয়ে নিচের ফরমটি পূরণ করুন</small>
                </div>
                <form id="topupForm">
                    <input type="hidden" name="package" id="selectedPackage">
                    
                    <input type="text" name="player_name" placeholder="আপনার নাম" required>
                    <input type="number" name="player_id" placeholder="প্লেয়ার UID (আইডি কোড)" required>
                    <input type="tel" name="phone" placeholder="আপনার মোবাইল নাম্বার" required>
                    <input type="text" name="payment" placeholder="বিকাশ Transaction ID (TrxID)" required>
                    
                    <button type="submit" class="submit-btn" id="submitBtn">অর্ডার কনফার্ম করুন</button>
                </form>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="#" class="nav-item"><i class="fas fa-plus-circle"></i>Add Money</a>
        <a href="#" class="nav-item"><i class="fas fa-history"></i>History</a>
        <a href="#" class="nav-item"><i class="fas fa-user"></i>Profile</a>
    </div>

    <script>
        // আপনার গুগল অ্যাপস স্ক্রিপ্ট লিঙ্ক
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxARxNylLdlyhcJ45XjCjJ30OfjWl2Ok-S294HJmXz2nE4z4DMWtvquVXFLuwfoZ6sJ/exec';
        
        const products = {
            guild: [
                { name: "1 BASIC - $2.30", price: "৳ 250" },
                { name: "2 BASIC - $3.00", price: "৳ 420" },
                { name: "5 BASIC - $7.00", price: "৳ 800" },
                { name: "10 BASIC - $12.00", price: "৳ 1400" },
                { name: "20 BASIC - $22.00", price: "৳ 2500" }
            ],
            offers: [
                { name: "WEEKLY", price: "BDT 160" },
                { name: "2X WEEKLY", price: "BDT 320" },
                { name: "3X WEEKLY", price: "BDT 480" },
                { name: "MONTHLY", price: "BDT 770" },
                { name: "2X MONTHLY", price: "BDT 1540" },
                { name: "1WEEKLY+1MONTHLY", price: "BDT 925" },
                { name: "3WEEKLY+1MONTHLY", price: "BDT 1245" }
            ],
            likes: [
                { name: "200 FF LIKE (প্রতিদিন ১বার)", price: "BDT 45" }
            ]
        };

        // প্যাকেজ লিস্ট ওপেন করার ফাংশন
        function openPkgModal(title, key) {
            document.getElementById('modalTitle').innerText = title;
            const list = document.getElementById('listContent');
            list.innerHTML = '';
            
            products[key].forEach(item => {
                const div = document.createElement('div');
                div.className = 'package-item';
                div.onclick = () => openOrderForm(`${item.name} (${item.price})`);
                div.innerHTML = `
                    <span class="pkg-name">${item.name}</span>
                    <span class="pkg-price">${item.price}</span>
                `;
                list.appendChild(div);
            });
            document.getElementById('pkgModal').style.display = 'block';
        }

        // অর্ডার ফর্ম ওপেন করার ফাংশন
        function openOrderForm(pkgDetails) {
            document.getElementById('pkgModal').style.display = 'none';
            document.getElementById('selectedPackage').value = pkgDetails;
            document.getElementById('orderModal').style.display = 'block';
        }

        function closeAllModals() {
            document.getElementById('pkgModal').style.display = 'none';
            document.getElementById('orderModal').style.display = 'none';
        }

        // গুগল শিটে ডাটা পাঠানোর মেইন ফাংশন
        const form = document.getElementById('topupForm');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "অর্ডার সাবমিট হচ্ছে...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    alert("অভিনন্দন! আপনার অর্ডারটি সফলভাবে জমা হয়েছে।");
                    form.reset();
                    btn.disabled = false;
                    btn.innerText = "অর্ডার কনফার্ম করুন";
                    closeAllModals();
                })
                .catch(error => {
                    alert("দুঃখিত! কানেকশন এরর হয়েছে। আবার চেষ্টা করুন।");
                    btn.disabled = false;
                    btn.innerText = "অর্ডার কনফার্ম করুন";
                    console.error('Error!', error.message);
                });
        });

        // বাইরে ক্লিক করলে মোডাল বন্ধ হবে
        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                closeAllModals();
            }
        }
    </script>
</body>
</html>
