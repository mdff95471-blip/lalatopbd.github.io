<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDX LALA TOPUP STORE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background-color: #f0f2f5; padding-bottom: 80px; }

        /* Header */
        .header { background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-size: 20px; font-weight: bold; color: #5c2d91; }
        .balance-box { background: #5c2d91; color: #fff; padding: 6px 15px; border-radius: 20px; font-size: 14px; display: flex; align-items: center; gap: 5px; }

        /* Banner Slider Style */
        .banner { width: 92%; margin: 15px auto; height: 160px; background: linear-gradient(45deg, #5c2d91, #8e44ad); border-radius: 15px; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; box-shadow: 0 4px 10px rgba(92, 45, 145, 0.3); }

        /* Section Title */
        .section-title { padding: 15px; font-size: 16px; font-weight: bold; color: #333; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ""; width: 4px; height: 18px; background: #5c2d91; border-radius: 2px; }

        /* Grid System */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 15px; }
        .card { background: #fff; border-radius: 12px; padding: 8px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; }
        .card:active { transform: scale(0.95); }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 8px; }
        .card p { font-size: 11px; font-weight: 600; color: #444; height: 30px; overflow: hidden; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ddd; }
        .nav-item { text-align: center; font-size: 11px; color: #666; text-decoration: none; }
        .nav-item span { font-size: 20px; display: block; margin-bottom: 2px; }
        .active-nav { color: #5c2d91; font-weight: bold; }

        /* Custom Alert */
        #orderAlert { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.2); z-index: 1000; text-align: center; width: 80%; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">OFFER TOPUP</div>
        <div class="balance-box"><span>💰</span> 187৳</div>
    </div>

    <div class="banner">
        <h2 style="margin-bottom: 5px;">গিবওয়ে ও সকল অফার</h2>
        <p style="font-size: 12px; opacity: 0.9;">সবচেয়ে দ্রুত এবং নিরাপদ টপআপ!</p>
        <button style="margin-top: 10px; padding: 5px 15px; border-radius: 15px; border: none; background: #fff; color: #5c2d91; font-weight: bold; font-size: 12px;">জয়েন করুন</button>
    </div>

    <div class="section-title">FREE FIRE</div>
    <div class="grid">
        <div class="card" onclick="placeOrder('UID TOPUP (BD)')">
            <img src="https://via.placeholder.com/150" alt="UID">
            <p>UID TOPUP (BD)</p>
        </div>
        <div class="card" onclick="placeOrder('Weekly/Monthly Offer')">
            <img src="https://via.placeholder.com/150" alt="Weekly">
            <p>Weekly/Monthly</p>
        </div>
        <div class="card" onclick="placeOrder('Level Up Pass')">
            <img src="https://via.placeholder.com/150" alt="Level Up">
            <p>LEVEL UP PASS</p>
        </div>
        <div class="card" onclick="placeOrder('E-Badge/Evo Access')">
            <img src="https://via.placeholder.com/150" alt="Evo">
            <p>E-Badge/Evo</p>
        </div>
        <div class="card" onclick="placeOrder('Indonesia Server UID')">
            <img src="https://via.placeholder.com/150" alt="Indo">
            <p>Indonesia Server</p>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item active-nav"><span>🏠</span>Home</a>
        <a href="#" class="nav-item"><span>➕</span>Add Money</a>
        <a href="#" class="nav-item"><span>📋</span>My Orders</a>
        <a href="#" class="nav-item"><span>👤</span>Account</a>
    </div>

    <script>
        function placeOrder(product) {
            // আপনার হোয়াটসঅ্যাপ নাম্বার দিন (88 সহ)
            const myNumber = "8801794327542"; 
            
            const text = `হ্যালো আরডিএক্স লালা ভাই,\nআমি আপনার ওয়েবসাইট থেকে এই অফারটি নিতে চাই:\n📦 অফার: ${product}\n\nআমাকে পেমেন্ট ডিটেইলস দিন।`;
            
            const encodedText = encodeURIComponent(text);
            const whatsappUrl = `https://wa.me/${myNumber}?text=${encodedText}`;
            
            // সরাসরি হোয়াটসঅ্যাপে নিয়ে যাবে
            window.open(whatsappUrl, '_blank');
        }
    </script>

</body>
</html>
