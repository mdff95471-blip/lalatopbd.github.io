<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LALA TOPUP - Fix Version</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px; }
        
        /* Header Fix */
        .header { background: #fff; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .brand { color: #6c5ce7; font-weight: bold; font-size: 1.1rem; }

        /* Status Styling */
        .status-badge { display: flex; align-items: center; gap: 5px; font-size: 0.7rem; padding: 3px 8px; border-radius: 12px; font-weight: bold; margin-left: 8px; }
        .status-online { background: #e7f9ed; color: #2ecc71; border: 1px solid #2ecc71; }
        .status-offline { background: #fceaea; color: #e74c3c; border: 1px solid #e74c3c; }
        .dot { width: 7px; height: 7px; border-radius: 50%; }
        .dot-on { background: #2ecc71; box-shadow: 0 0 5px #2ecc71; }
        .dot-off { background: #e74c3c; }

        /* --- THE FIXED NOTICE BAR (এখানেই মেইন পরিবর্তন) --- */
        .notice-container {
            width: 100%;
            background: #2d3436;
            height: 40px;
            display: block !important; /* নিশ্চিত করা যেন হাইড না হয় */
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid #6c5ce7;
            z-index: 999;
        }

        .notice-label {
            position: absolute;
            left: 0;
            top: 0;
            background: #6c5ce7;
            color: #fff;
            padding: 0 12px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 13px;
            z-index: 1001;
            box-shadow: 4px 0 8px rgba(0,0,0,0.4);
        }

        .scroll-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
        }

        .scrolling-text {
            white-space: nowrap;
            padding-left: 100%;
            display: inline-block;
            animation: lala-scroll 15s linear infinite;
            font-size: 14px;
            color: #fff;
        }

        @keyframes lala-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-150%); }
        }

        /* Status Colors */
        .online-glow { color: #55efc4 !important; text-shadow: 0 0 5px rgba(85,239,196,0.5); }
        .offline-glow { color: #ff7675 !important; font-weight: bold; }

        /* Rest of the UI */
        .banner { width: 95%; margin: 15px auto; border-radius: 12px; overflow: hidden; display: block; }
        .banner img { width: 100%; height: auto; }
        .section-title { padding-left: 15px; margin: 15px 0; font-size: 1rem; border-left: 4px solid #6c5ce7; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px; }
        .card { background: #fff; border-radius: 10px; border: 1px solid #eee; text-align: center; padding-bottom: 10px; }
        .card img { width: 100%; border-radius: 10px 10px 0 0; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display: flex; align-items: center;">
            <div class="brand">LALA TOPUP</div>
            <div id="adminBadge" class="status-badge status-online">
                <div id="adminDot" class="dot dot-on"></div>
                <span id="adminText">Online</span>
            </div>
        </div>
        <div class="balance">৳ 0.00</div>
    </div>

    <div class="notice-container">
        <div class="notice-label">NOTICE</div>
        <div class="scroll-wrapper">
            <div id="lalaNotice" class="scrolling-text">অ্যাডমিন স্ট্যাটাস লোড হচ্ছে...</div>
        </div>
    </div>

    <div class="banner">
        <img src="banner.jpg">
    </div>

    <div class="section-title">FREE FIRE TOPUP</div>
    <div class="grid">
        <div class="card"><img src="glory.jpg"><p>Guild Glory</p></div>
        <div class="card"><img src="offer.jpg"><p>UID Topup</p></div>
    </div>

    <script>
        const dbURL = "https://lala-status-default-rtdb.asia-southeast1.firebasedatabase.app/.json";

        function checkStatus() {
            const badge = document.getElementById('adminBadge');
            const dot = document.getElementById('adminDot');
            const text = document.getElementById('adminText');
            const notice = document.getElementById('lalaNotice');

            fetch(dbURL)
                .then(res => res.json())
                .then(data => {
                    if (data && data.status === 'online') {
                        badge.className = "status-badge status-online";
                        dot.className = "dot dot-on";
                        text.innerText = "Online";
                        
                        notice.className = "scrolling-text online-glow";
                        notice.innerHTML = "✅ অ্যাডমিন অনলাইনে আছে। অর্ডার করলে দ্রুত ডেলিভারি পাবেন। এখনই অর্ডার করুন!";
                    } else {
                        badge.className = "status-badge status-offline";
                        dot.className = "dot dot-off";
                        text.innerText = "Offline";
                        
                        notice.className = "scrolling-text offline-glow";
                        notice.innerHTML = "⚠️ অ্যাডমিন বর্তমানে অফলাইনে! এখন অর্ডার করলে ডেলিভারি পেতে দেরি হতে পারে। দয়া করে অপেক্ষা করুন।";
                    }
                })
                .catch(err => {
                    notice.innerText = "সার্ভার এরর! ইন্টারনেট চেক করুন।";
                });
        }

        setInterval(checkStatus, 5000);
        checkStatus();
    </script>
</body>
</html>
