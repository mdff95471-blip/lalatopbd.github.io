<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LALA TOPUP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f5f6fa; padding-bottom: 80px; }
        .header { background: #fff; padding: 15px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .user-name { font-weight: bold; color: #5c2d91; }
        .balance-box { background: #5c2d91; color: #fff; padding: 2px 10px; border-radius: 10px; font-size: 12px; margin-top: 5px; width: fit-content; }
        .section-title { padding: 15px; font-weight: bold; color: #333; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .card { background: #fff; border-radius: 10px; padding: 10px; text-align: center; border: 1px solid #eee; cursor: pointer; }
        .card img { width: 100%; border-radius: 8px; margin-bottom: 5px; }
        .card p { font-size: 10px; font-weight: bold; }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: #fff; margin: 20% auto; padding: 20px; width: 90%; max-width: 400px; border-radius: 15px; position: relative; }
        .close { position: absolute; right: 15px; top: 10px; font-size: 24px; cursor: pointer; }
        .modal-header { font-weight: bold; margin-bottom: 15px; text-align: center; color: #5c2d91; }

        /* Package List Styling */
        .package-item { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .package-item:hover { border-color: #5c2d91; background: #f8f0ff; }
        
        /* Single Package Styling (For Card 3) */
        .single-box { border: 2px solid #5c2d91; background: #f8f0ff; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; }
        .continue-btn { background: #1ab394; color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <div class="user-name">LALA TOPUP</div>
            <div class="balance-box">৳ 0.00</div>
        </div>
    </div>

    <div class="section-title">FREE FIRE TOPUP</div>
    
    <div class="grid">
        <div class="card" onclick="openModal('FF Guild glory', 'guild')">
            <img src="https://i.ibb.co/Xf7y4zF/glory.jpg" alt="Guild">
            <p>FF Guild glory</p>
        </div>

        <div class="card" onclick="openModal('Weekly/Monthly Offer', 'offers')">
            <img src="https://i.ibb.co/m0fL7yL/offer.jpg" alt="Offer">
            <p>Weekly/Monthly Offer</p>
        </div>

        <div class="card" onclick="openSinglePackage()">
            <img src="https://i.ibb.co/YyY1M0m/like.jpg" alt="Like">
            <p>Free Fire - 200 Like প্রতিদিন</p>
        </div>
    </div>

    <div id="generalModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('generalModal')">&times;</span>
            <div id="modalTitle" class="modal-header"></div>
            <div id="packageList"></div>
        </div>
    </div>

    <div id="singleModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('singleModal')">&times;</span>
            <div class="modal-header">Select Recharge</div>
            <div class="single-box">
                <div style="font-weight: bold; font-size: 14px;">200 FF LIKE- প্রতিদিন ১ আইডিতে ১বার</div>
                <div style="color: #5c2d91; font-weight: 900; margin-top: 5px;">BDT 45</div>
            </div>
            <button class="continue-btn" onclick="sendWhatsApp('200 FF LIKE (BDT 45)')">Continue</button>
        </div>
    </div>

    <script>
        // কার্ড ১ ও ২ এর ডেটা (আগের মতো)
        const data = {
            guild: [
                { name: "1 BASIC - $2.50", price: "৳ 150" },
                { name: "5 BASIC - $7.00", price: "৳ 700" }
            ],
            offers: [
                { name: "Weekly Lite", price: "৳ 30" },
                { name: "Weekly Pro", price: "৳ 160" },
                { name: "Monthly Offer", price: "৳ 800" }
            ]
        };

        function openModal(title, type) {
            const modal = document.getElementById('generalModal');
            const listDiv = document.getElementById('packageList');
            document.getElementById('modalTitle').innerText = title;
            
            listDiv.innerHTML = '';
            data[type].forEach(pkg => {
                listDiv.innerHTML += `
                    <div class="package-item" onclick="sendWhatsApp('${pkg.name}')">
                        <span>${pkg.name}</span>
                        <span style="font-weight:bold; color:#5c2d91;">${pkg.price}</span>
                    </div>
                `;
            });
            modal.style.display = "block";
        }

        function openSinglePackage() {
            document.getElementById('singleModal').style.display = "block";
        }

        function closeModal(id) {
            document.getElementById(id).style.display = "none";
        }

        function sendWhatsApp(pkgName) {
            const phone = "8801794327542"; 
            const msg = encodeURIComponent("হ্যালো LALA TOPUP, আমি এই প্যাকেজটি নিতে চাই: " + pkgName);
            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        }

        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                event.target.style.display = "none";
            }
        }
    </script>
</body>
</html>
