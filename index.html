<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDX LALA - Hacker Dashboard</title>
<style>
  body, html { margin:0; padding:0; font-family: monospace; background:black; color:#00ffcc; overflow-x:hidden; }
  canvas { position:fixed; top:0; left:0; z-index:0; }

  .dashboard { position: relative; z-index:1; padding:50px; text-align:center; }

  /* Circular profile picture */
  .profile-pic {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid #00ffcc;
    object-fit: cover;
    box-shadow: 0 0 15px #00ffcc;
    margin-bottom: 10px;
  }

  /* Buttons */
  .btn-wrapper { display: inline-block; text-align:center; margin:15px; }
  .btn {
    display:inline-block; padding:12px 25px; color:#00ffcc; border:1px solid #00ffcc;
    border-radius:8px; text-decoration:none; transition:0.3s; box-shadow:0 0 10px #00ffcc; margin-top:10px;
  }
  .btn:hover { background:#00ffcc; color:black; box-shadow:0 0 25px #00ffcc; }

  /* Terminal */
  .terminal {
    background: rgba(0,0,0,0.7);
    border:1px solid #0f0;
    padding:20px;
    margin:30px auto;
    width:80%;
    max-width:600px;
    text-align:left;
    height:150px;
    overflow-y:auto;
  }

</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="dashboard">

  <!-- Facebook -->
  <div class="btn-wrapper">
    <img src="profile.jpg" class="profile-pic">
    <a href="https://www.facebook.com/" class="btn">📘 Facebook</a>
</div>

<div class="btn-wrapper">
    <img src="tiktok_pic.jpg" class="profile-pic">
    <a href="https://www.tiktok.com/@আপনার_ইউজারনেম" class="btn">🎵 TikTok</a>
</div>

<div class="btn-wrapper">
    <img src="profile.jpg" class="profile-pic">
    <a href="https://www.youtube.com/" class="btn">▶️ YouTube</a>
</div>

  <!-- Terminal -->
  <div class="terminal" id="terminal">
    > Welcome to RDX LALA<br>
  </div>
</div>

<script>
/* Matrix background */
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#0f0";
  ctx.font = fontSize + "px monospace";
  for(let x = 0; x<drops.length; x++){
    const text = letters.charAt(Math.floor(Math.random()*letters.length));
    ctx.fillText(text, x*fontSize, drops[x]*fontSize);
    if(drops[x]*fontSize > canvas.height && Math.random() > 0.975) drops[x] = 0;
    drops[x]++;
  }
}
setInterval(draw, 50);

window.addEventListener('resize', () => { 
  canvas.width = window.innerWidth; 
  canvas.height = window.innerHeight; 
});
</script>

</body>
</html>
