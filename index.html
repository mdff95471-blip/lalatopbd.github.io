<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LALA TOPUP - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px; }
        .header { background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .brand { color: #6c5ce7; font-weight: bold; font-size: 1.1rem; }
        .balance-badge { background: #6c5ce7; color: white; padding: 4px 12px; border-radius: 15px; font-size: 0.85rem; }
        
        /* স্ট্যাটাস ইন্ডিকেটর */
        .status-badge { display: flex; align-items: center; gap: 5px; font-size: 0.7rem; padding: 3px 8px; border-radius: 12px; font-weight: bold; margin-left: 8px; }
        .status-online { background: #e7f9ed; color: #2ecc71; border: 1px solid #2ecc71; }
        .status-offline { background: #fceaea; color: #e74c3c; border: 1px solid #e74c3c; }
        .dot { width: 7px; height: 7px; border-radius: 50%; }
        .dot-on { background: #2ecc71; box-shadow: 0 0 5px #2ecc71; }
        .dot-off { background: #e74c3c; }

        /* প্রিমিয়াম অ্যানিমেশন নোটিশ বার */
        .notice-bar { 
            background: #2d3436; 
            color: white; 
            height: 45px; 
            overflow: hidden; 
            position: relative; 
            display: flex; 
            align-items: center;
            border-bottom: 2px solid #6c5ce7;
        }
        .notice-label { 
            background: #6c5ce7; 
            color: #ffeb3b;
            padding: 0 15px; 
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: bold; 
            z-index: 10; 
            position: absolute; 
            left: 0;
            box-shadow: 5px 0 10px rgba(0,0,0,0.3);
        }
        .scrolling-wrapper { 
            width: 100%; 
            display: flex;
            white-space: nowrap;
        }
        .scrolling-text { 
            display: inline-block; 
            padding-left: 100%; 
            animation: scroll-left 18s linear infinite; 
            font-size: 0.9rem;
        }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* অফলাইন ও অনলাইন নোটিশ স্পেশাল */
        .flash-red { color: #ff7675 !important; text-shadow: 0 0 8px #d63031; font-weight: bold; }
        .glow-green { color: #55efc4 !important; text-shadow: 0 0 5px rgba(85, 239, 196, 0.5); }

        .banner-slider { width: 95%; margin: 15px auto; border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .slides { display: flex; width: 200%; animation: slide-anim 10s infinite; }
        .slides img { width: 50%; aspect-ratio: 1000 / 398; object-fit: cover; display: block; }
        @keyframes slide-anim { 0% { transform: translateX(0); } 45% { transform: translateX(0); } 50% { transform: translateX(-50%); } 95% { transform: translateX(-50%); } 100% { transform: translateX(0); } }

        .section-header { padding: 0 15px; margin: 20px 0 10px; font-size: 0.9rem; font-weight: bold; color: #444; border-left: 4px solid #6c5ce7; margin-left: 15px; }
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 10px; }
        .product-card { background: #fff; border-radius: 10px; border: 1px solid #eee; overflow: hidden; text-align: center; padding-bottom: 8px; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .product-card:active { transform: scale(0.95); }
        .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .product-name { font-size: 0.65rem; color: #333; margin-top: 5px; padding: 0 3px; font-weight: 600; line-height: 1.2; height: 1.5em; overflow: hidden; }
        
        /* মডাল ও অন্যান্য স্টাইল */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; padding-top: 30px; }
        .modal-content { background: white; margin: 0 auto 50px auto; width: 92%; max-width: 450px; border-radius: 18px; overflow: hidden; position: relative; animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideIn { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .submit-btn { width: 100%; background: #6c5ce7; color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 0.7rem; text-decoration: none; flex: 1; }
        .nav-item i { display: block; font-size: 1.3rem; margin-bottom: 4px; }
        .nav-item.active { color: #6c5ce7; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div class="header">
        <div style="display: flex; align-items: center;">
            <div class="brand">LALA TOPUP</div>
            <div id="adminBadge" class="status-badge status-online">
                <div id="adminDot" class="dot dot-on"></div>
                <span id="adminText">Checking...</span>
            </div>
        </div>
        <div class="balance-badge">৳ 0.00</div>
    </div>

    <div class="notice-bar">
        <div class="notice-label">Notice:</div>
        <div class="scrolling-wrapper">
            <div id="lala-scrolling-notice" class="scrolling-text">অ্যাডমিন স্ট্যাটাস লোড হচ্ছে...</div>
        </div>
    </div>

    <div class="banner-slider">
        <div class="slides">
            <img src="banner1.jpg" alt="Banner 1">
            <img src="banner2.jpg" alt="Banner 2">
        </div>
    </div>

    <div class="section-header">FREE FIRE TOPUP</div>
    <div class="card-grid">
        <div class="product-card" onclick="openPkgModal('FF Guild glory', 'guild', 'glory.jpg')"><img src="glory.jpg"><div class="product-name">FF Guild glory</div></div>
        <div class="product-card" onclick="openPkgModal('UID TOPUP (BD)', 'offers', 'offer.jpg')"><img src="offer.jpg"><div class="product-name">UID Diamond Topup</div></div>
        <div class="product-card" onclick="openPkgModal('Free Fire - 200 Like', 'likes', 'like.jpg')"><img src="like.jpg"><div class="product-name">Free Fire - 200 Like প্রতিদিন</div></div>
        <div class="product-card" onclick="openPkgModal('Weekly/Monthly Offer', 'weekly_monthly', 'weekly.jpg')"><img src="weekly.jpg"><div class="product-name">Weekly/Monthly Offer</div></div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="#" class="nav-item"><i class="fas fa-play-circle"></i>Tutorial</a>
        <a href="#" class="nav-item"><i class="fas fa-bolt"></i>TopUp</a>
        <a href="#" class="nav-item"><i class="fas fa-th-large"></i>Contact</a>
    </div>

    <div id="unifiedModal" class="modal">
        <div class="modal-content">
            <div style="padding: 20px; text-align: center;">
                <h2 id="modalTitle">Selection</h2>
                <div id="listContent" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0;"></div>
                <input type="hidden" id="selectedPackage">
                <input type="number" id="player_id" placeholder="প্লেয়ার UID" style="width: 90%; padding: 10px; margin: 5px 0;">
                <input type="tel" id="phone" placeholder="আপনার নাম্বার" style="width: 90%; padding: 10px; margin: 5px 0;">
                <input type="text" id="payment" placeholder="TrxID" style="width: 90%; padding: 10px; margin: 5px 0;">
                <button class="submit-btn" id="submitBtn" onclick="submitOrder()">অর্ডার কনফার্ম করুন</button>
                <button onclick="closeModal()" style="margin-top: 10px; border: none; background: none; color: #888;">বন্ধ করুন</button>
            </div>
        </div>
    </div>

    <script>
        const botToken = "8791604536:AAGHR3iQmldzR7Ld7Q7thyJRODJa2E7lr54";
        const chatId = "-1003881711233";
        const dbURL = "https://lala-status-default-rtdb.asia-southeast1.firebasedatabase.app/.json";

        function syncLiveStatus() {
            const badge = document.getElementById('adminBadge');
            const dot = document.getElementById('adminDot');
            const text = document.getElementById('adminText');
            const notice = document.getElementById('lala-scrolling-notice');

            fetch(dbURL)
                .then(res => res.json())
                .then(data => {
                    if (data && data.status === 'online') {
                        badge.className = "status-badge status-online";
                        dot.className = "dot dot-on";
                        text.innerText = "Online";
                        notice.className = "scrolling-text glow-green";
                        notice.innerHTML = "● অ্যাডমিন এখন অনলাইনে আছে! অর্ডার করলে ৫-১০ মিনিটে ডেলিভারি পাবেন। ইনশাআল্লাহ। ●";
                    } else {
                        badge.className = "status-badge status-offline";
                        dot.className = "dot dot-off";
                        text.innerText = "Offline";
                        notice.className = "scrolling-text flash-red";
                        notice.innerHTML = "⚠ অ্যাডমিন এখন অফলাইনে! এখন অর্ডার করলে ডেলিভারি পেতে দেরি হতে পারে। ধৈর্য ধরুন। ⚠";
                    }
                })
                .catch(err => console.log("Sync error"));
        }

        setInterval(syncLiveStatus, 5000);
        syncLiveStatus();

        const products = {
            guild: [{name:"1 BASIC", price:"৳ 250"}, {name:"2 BASIC", price:"৳ 420"}],
            offers: [{name:"25 Diamond", price:"BDT 24"}, {name:"50 Diamond", price:"BDT 43"}],
            weekly_monthly: [{name:"WEEKLY", price:"BDT 160"}, {name:"MONTHLY", price:"BDT 770"}],
            likes: [{ name: "200 FF LIKE", price: "BDT 45" }]
        };

        function openPkgModal(title, key) {
            document.getElementById('modalTitle').innerText = title;
            const list = document.getElementById('listContent');
            list.innerHTML = '';
            products[key].forEach(item => {
                const btn = document.createElement('div');
                btn.style = "border: 1px solid #ddd; padding: 10px; border-radius: 8px; cursor: pointer;";
                btn.innerHTML = `${item.name}<br><b style="color:#6c5ce7">${item.price}</b>`;
                btn.onclick = () => {
                    document.getElementById('selectedPackage').value = `${item.name} (${item.price})`;
                    alert(item.name + " সিলেক্ট হয়েছে");
                };
                list.appendChild(btn);
            });
            document.getElementById('unifiedModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('unifiedModal').style.display = 'none'; }

        function submitOrder() {
            const pkg = document.getElementById('selectedPackage').value;
            const uid = document.getElementById('player_id').value;
            if (!pkg || !uid) { alert("সব তথ্য দিন!"); return; }
            
            const msg = `🚀 NEW ORDER\n📦 Pkg: ${pkg}\n🆔 UID: ${uid}\n📞 Phone: ${document.getElementById('phone').value}`;
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: msg })
            }).then(() => { alert("অর্ডার সফল হয়েছে!"); closeModal(); });
        }
    </script>
</body>
</html>
