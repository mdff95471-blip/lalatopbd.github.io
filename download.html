<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LALA TOPUP - Download Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        
        /* Header */
        .header { background: #fff; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .back-btn { font-size: 1.2rem; color: #6c5ce7; margin-right: 15px; cursor: pointer; text-decoration: none; }
        .brand { color: #6c5ce7; font-weight: bold; font-size: 1.1rem; }

        .section-header { padding: 0 15px; margin: 25px 0 12px; font-size: 1rem; font-weight: bold; color: #1e3799; text-align: center; text-transform: uppercase; }

        /* Download Card Grid */
        .download-grid { padding: 0 15px; display: flex; flex-direction: column; gap: 15px; }
        .download-item { background: #fff; border-radius: 15px; padding: 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .file-info { display: flex; align-items: center; gap: 15px; }
        .file-icon { width: 50px; height: 50px; background: #f0edff; color: #6c5ce7; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .file-details h4 { margin: 0; font-size: 0.9rem; color: #333; }
        .file-details p { margin: 2px 0 0; font-size: 0.75rem; color: #888; }
        
        .dl-btn { background: #6c5ce7; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; cursor: pointer; text-decoration: none; transition: 0.3s; }
        .dl-btn:active { transform: scale(0.9); }

        /* Footer & Nav */
        .footer-dark { background: #0a1128; color: white; padding: 40px 20px; text-align: center; margin-top: 30px; font-size: 0.75rem; opacity: 0.5; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 0.7rem; text-decoration: none; flex: 1; }
        .nav-item.active { color: #6c5ce7; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="brand">DOWNLOAD CENTER</div>
    </div>

    <div class="section-header">Available Files</div>

    <div class="download-grid">
        <!-- ফাইল ১: জিপ ফাইল -->
        <div class="download-item">
            <div class="file-info">
                <div class="file-icon"><i class="fas fa-file-archive"></i></div>
                <div class="file-details">
                    <h4>Main Script ZIP</h4>
                    <p>Size: 1.2 MB | Type: ZIP</p>
                </div>
            </div>
            <a href="files/script.zip" download class="dl-btn"><i class="fas fa-download"></i></a>
        </div>

        <!-- ফাইল ২: এপিকে ফাইল -->
        <div class="download-item">
            <div class="file-info">
                <div class="file-icon" style="background: #e7f9ed; color: #2ecc71;"><i class="fab fa-android"></i></div>
                <div class="file-details">
                    <h4>LALA TopUp App</h4>
                    <p>Size: 5.5 MB | Type: APK</p>
                </div>
            </div>
            <a href="files/lala_topup.apk" download class="dl-btn" style="background: #2ecc71;"><i class="fas fa-download"></i></a>
        </div>
    </div>

    <footer class="footer-dark">
        <p>© LALA TOPUP 2026 | Developed By LALA</p>
    </footer>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><br>Home</a>
        <a href="download.html" class="nav-item active"><i class="fas fa-download"></i><br>Download</a>
        <a href="#" class="nav-item"><i class="fas fa-bolt"></i><br>TopUp</a>
        <a href="#" class="nav-item"><i class="fas fa-th-large"></i><br>Contact</a>
    </div>

</body>
</html>
